<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#0f3b57">
<title>Oregon Road Trip Mobile Guide with Images</title>
<style>
:root {
  --bg:#f5f7fa; --card:#fff; --ink:#14202b; --muted:#5d6d7d; --line:#e5ebf1;
  --blue:#0f3b57; --green:#0b7a4b; --gold:#b56b00; --purple:#7b3294;
  --shadow:0 8px 28px rgba(15,59,87,.12);
}
*{box-sizing:border-box}
html{scroll-behavior:smooth}
body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Inter,Arial,sans-serif;background:var(--bg);color:var(--ink);line-height:1.42}
header{position:sticky;top:0;z-index:20;background:linear-gradient(135deg,#0b2b42,#0f3b57);color:white;padding:12px 12px 10px;border-bottom:1px solid rgba(255,255,255,.16)}
header h1{font-size:19px;margin:0 0 3px}
header p{margin:0;color:#d7e7ef;font-size:12px}
.nav{display:flex;gap:7px;overflow-x:auto;padding-top:9px}
.nav a,.nav button{white-space:nowrap;border:1px solid rgba(255,255,255,.25);background:#174d70;color:white;border-radius:999px;padding:10px 12px;text-decoration:none;font-size:12px;font-weight:800;min-height:44px;display:flex;align-items:center}
.filters{display:flex;gap:8px;overflow-x:auto;background:white;padding:9px 10px;border-bottom:1px solid var(--line);position:sticky;top:76px;z-index:18}
.filters button{white-space:nowrap;border:1px solid var(--line);background:white;border-radius:999px;padding:10px 13px;font-size:12px;font-weight:800;color:var(--blue);min-height:44px}
.filters button.active{background:var(--blue);color:white;border-color:var(--blue)}
main{max-width:1100px;margin:0 auto;padding:12px 9px 60px}
.hero,.day{background:white;border:1px solid var(--line);border-radius:18px;box-shadow:var(--shadow);overflow:hidden;margin-bottom:14px}
.hero{padding:14px}
.hero h2{font-size:18px;margin:0 0 8px}
.hero ul{margin:8px 0 0;padding-left:20px;color:#334}
.legend{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px}
.pill,.badge{border-radius:999px;padding:6px 9px;font-size:11px;font-weight:900;text-transform:uppercase}
.mandatory{background:#e8f8f0;color:var(--green)}
.optional{background:#fff2dc;color:var(--gold)}
.swap{background:#f6e9ff;color:var(--purple)}
.daytop{padding:15px;background:white;display:grid;gap:10px}
.date{font-weight:900;color:var(--blue);font-size:12px;text-transform:uppercase;letter-spacing:.04em;margin:0}
h2{font-size:20px;line-height:1.18;margin:2px 0 6px}
.hotel{border-left:4px solid var(--blue);background:#f1f7fb;padding:10px;border-radius:12px;font-size:13px;color:#344}
.dayroute{display:flex;gap:8px;padding:0 15px 14px;overflow:auto}
.dayroute a,.dayroute button{border:1px solid var(--line);background:white;border-radius:12px;padding:10px 12px;color:var(--blue);font-weight:900;text-decoration:none;font-size:12px;min-height:44px;display:flex;align-items:center}
.stops{background:#f7f9fb;padding:10px;display:grid;grid-template-columns:1fr;gap:11px}
.card{background:white;border:1px solid var(--line);border-radius:16px;overflow:hidden}
.card[data-kind="mandatory"]{border-left:5px solid var(--green)}
.card[data-kind="optional"]{border-left:5px solid var(--gold)}
.card[data-kind="swap"]{border-left:5px solid var(--purple)}
.imgwrap{aspect-ratio:16/10;min-height:190px;background:#dfe7ee;position:relative;overflow:hidden}
.imgwrap img{position:absolute;inset:0;z-index:1;width:100%;height:100%;object-fit:cover;display:block;background:#dfe7ee}
.imgfallback{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;text-align:center;color:#50606d;font-weight:900;padding:18px;background:linear-gradient(135deg,#edf3f7,#dce8ef)}
.imgfallback strong{font-size:16px;line-height:1.2}
.imgfallback a{border:1px solid #c8d6e0;background:white;border-radius:12px;color:var(--blue);font-size:12px;font-weight:900;min-height:44px;padding:11px 14px;text-decoration:none;display:flex;align-items:center}
.imgwrap.loaded .imgfallback{display:none}
.imgwrap.missing .imgfallback{display:flex}
.imgcredit{position:absolute;z-index:2;right:7px;bottom:7px;background:rgba(0,0,0,.55);color:white;border-radius:999px;font-size:10px;padding:4px 7px;max-width:80%;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.imgwrap.missing .imgcredit{display:none}
.content{padding:12px}
.head{display:flex;justify-content:space-between;gap:8px;align-items:flex-start}
.seq{font-size:10px;color:var(--muted);font-weight:900;text-transform:uppercase;letter-spacing:.07em}
h3{font-size:18px;margin:2px 0 8px}
.meta{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin:8px 0 10px}
.meta div{border:1px solid var(--line);background:#f8fafc;border-radius:12px;padding:7px}
.meta span{display:block;font-size:10px;text-transform:uppercase;color:var(--muted);font-weight:900}
.meta b{font-size:12px}
p{margin:8px 0;font-size:14px;color:#2e3b46}
.note{color:#52606b}
.actions{display:flex;gap:7px;flex-wrap:wrap;margin-top:10px}
.actions a,.visited{border:1px solid var(--line);background:#fff;border-radius:12px;padding:10px 12px;text-decoration:none;color:var(--blue);font-weight:900;font-size:12px;min-height:44px;display:flex;align-items:center}
.visited{color:var(--ink);display:flex;align-items:center;gap:6px}
input[type=checkbox]{width:22px;height:22px}
.hidden{display:none!important}
@media(min-width:760px){
  .daytop{grid-template-columns:1.4fr .9fr;align-items:start}
  .stops{grid-template-columns:1fr 1fr}
  .imgwrap{min-height:210px}
}
@media(min-width:1020px){
  .stops{grid-template-columns:1fr 1fr 1fr}
}
@media print{header,.filters,.actions,.dayroute{display:none} body{background:white} .day,.card,.hero{box-shadow:none;break-inside:avoid}}
</style>

const ASSET_DIR = "oregon-assets";
function imageFileName(name) {
  const slug = String(name || "oregon-stop")
    .toLowerCase()
    .normalize("NFKD")
    .replace(/[\u0300-\u036f]/g, "")
    .replace(/&/g, " and ")
    .replace(/[’']/g, "")
    .replace(/[^a-z0-9]+/g, "-")
    .replace(/^-+|-+$/g, "");
  return (slug || "oregon-stop") + ".jpg";
}
function imageSrc(name) {
  return `${ASSET_DIR}/${imageFileName(name)}`;
}
function markImageLoaded(img) {
  img.closest(".imgwrap")?.classList.add("loaded");
}
function markImageMissing(img) {
  const wrap = img.closest(".imgwrap");
  img.remove();
  wrap?.classList.add("missing");
}

function mapsUrl(name) {
  return "https://www.google.com/maps/search/?api=1&query=" + encodeURIComponent(name + " Oregon");
}
function photosUrl(name) {
  return "https://www.google.com/search?tbm=isch&q=" + encodeURIComponent(name + " Oregon");
}
function routeUrl(stops) {
  const names = stops.filter(s => !s[0].startsWith("WFH") && !s[0].startsWith("Drive back")).slice(0, 9).map(s => s[0] + " Oregon");
  if (names.length < 2) return mapsUrl(names[0] || "Oregon");
  const origin = encodeURIComponent(names[0]);
  const destination = encodeURIComponent(names[names.length-1]);
  const waypoints = names.slice(1,-1).map(encodeURIComponent).join("|");
  return `https://www.google.com/maps/dir/?api=1&origin=${origin}&destination=${destination}&waypoints=${waypoints}&travelmode=driving`;
}
function kind(status) {
  const s = status.toLowerCase();
  if (s.includes("swap") || s.includes("big add")) return "swap";
  if (s.includes("optional")) return "optional";
  return "mandatory";
}
function esc(s) {
  return String(s || "").replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
}

      <ul>
        <li>Images are stored locally in <b>oregon-assets/</b>, plus Google Images backup links.</li>
        <li>Tap <b>Open Maps</b> for actual navigation. Tap <b>View More Photos</b> when deciding optional stops.</li>
        <li>Mandatory = high-priority. Optional = only if time, energy, weather, and parking work.</li>
      </ul>
      <div class="legend"><span class="pill mandatory">Mandatory</span><span class="pill optional">Optional</span><span class="pill swap">Swap / Big Add</span></div>
    </section>
  ` + days.map((d,di)=>`
    <section class="day" id="day${di}">
      <div class="daytop">
        <div><p class="date">${esc(d.date)}</p><h2>${esc(d.title)}</h2><p>${esc(d.hotel)}</p></div>
        <div class="hotel">${esc(d.hotel)}</div>
      </div>
      <div class="dayroute">
        <a href="${routeUrl(d.stops)}" target="_blank" rel="noopener">🧭 Rough day route</a>
        <button onclick="copyDay(${di})">Copy day</button>
      </div>
      <div class="stops">
        ${d.stops.map((s,si)=>cardHtml(s,di,si)).join("")}
      </div>
    </section>
  `).join("");
  loadVisited();
}
function cardHtml(s,di,si) {
  const [name,status,wiki,desc,visit,hike,drive] = s;
  const k = kind(status);
  const id = `d${di}s${si}`;
  const photoUrl = photosUrl(name);
  return `
  <article class="card" data-kind="${k}">
    <div class="imgwrap">
      <div class="imgfallback">
        <strong>${esc(name)}</strong>
        <a href="${photoUrl}" target="_blank" rel="noopener">View More Photos</a>
      </div>
      <img src="${imageSrc(name)}" alt="${esc(name)} photo" loading="lazy" decoding="async" onload="markImageLoaded(this)" onerror="markImageMissing(this)">
      <span class="imgcredit">Local asset</span>
    </div>
    <div class="content">
      <div class="head"><div><div class="seq">Stop ${si+1}</div><h3>${esc(name)}</h3></div><span class="badge ${k}">${esc(status)}</span></div>
      <div class="meta">
        <div><span>Drive</span><b>${esc(drive)}</b></div>
        <div><span>Visit</span><b>${esc(visit)}</b></div>
        <div><span>Hike</span><b>${esc(hike)}</b></div>
        <div><span>Decision</span><b>${esc(status)}</b></div>
      </div>
      <p><b>Details:</b> ${esc(desc)}</p>
      <div class="actions">
        <a href="${mapsUrl(name)}" target="_blank" rel="noopener">📍 Open Maps</a>
        <a href="${photoUrl}" target="_blank" rel="noopener">🖼️ View More Photos</a>
        <label class="visited"><input type="checkbox" data-id="${id}" onchange="saveVisited(this)"> Visited</label>
      </div>
    </div>
  </article>`;
}
function filterCards(k, btn) {
  document.querySelectorAll(".filters button").forEach(b=>b.classList.remove("active"));
  btn.classList.add("active");
  document.querySelectorAll(".card").forEach(c=> {
    c.classList.toggle("hidden", k !== "all" && c.dataset.kind !== k);
  });
}
function saveVisited(cb) {
  localStorage.setItem("visited_" + cb.dataset.id, cb.checked ? "1" : "0");
}
function loadVisited() {
  document.querySelectorAll("input[data-id]").forEach(cb => {
    cb.checked = localStorage.getItem("visited_" + cb.dataset.id) === "1";
  });
}
function copyDay(di) {
  const d = days[di];
  const text = `${d.date} — ${d.title}\n${d.hotel}\n` + d.stops.map((s,i)=>`${i+1}. [${s[1]}] ${s[0]} — ${s[4]}`).join("\n");
  navigator.clipboard.writeText(text).then(()=>alert("Copied day stops"));
}
render();
</script>
</body>
</html>
